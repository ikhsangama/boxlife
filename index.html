<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Life in Weeks — Wallpaper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --ink:#0d0c0a;
    --lived:#8a7359;
    --now:#c05a3a;
    --outline: rgba(242,236,224,0.10);
    --muted: rgba(242,236,224,0.42);
    --paper:#f2ece0;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    width:100%;
    height:100%;
    background:var(--ink);
    overflow:hidden;
    font-family:'JetBrains Mono', monospace;
    -webkit-text-size-adjust:100%;
  }

  .stage{
    position:fixed;
    inset:0;
    height:100dvh;
    height:100svh;
    display:flex;
    flex-direction:column;
    padding:
      max(2.4dvh, env(safe-area-inset-top) + 1.6dvh)
      max(4vmin, env(safe-area-inset-right) + 2vmin)
      max(2.4dvh, env(safe-area-inset-bottom) + 1.6dvh)
      max(4vmin, env(safe-area-inset-left) + 2vmin);
  }

  .header{
    flex: 0 0 auto;
    text-align:center;
  }

  .headline{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-style:italic;
    color:var(--paper);
    font-size: clamp(20px, 5.6vmin, 34px);
    line-height:1.05;
    margin-bottom: 0.5dvh;
  }

  .sub{
    color:var(--muted);
    font-size: clamp(9px, 2.1vmin, 13px);
    letter-spacing:0.02em;
  }

  .stats{
    flex: 0 0 auto;
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap: 2vmin;
    color:var(--muted);
    text-align:center;
    margin-top: 2.4dvh;
  }

  .stats .item{
    display:flex;
    flex-direction:column;
    gap:0.4dvh;
  }

  .stats .num{
    color:var(--paper);
    font-weight:600;
    font-family:'Fraunces', serif;
    font-size: clamp(13px, 3.2vmin, 20px);
    line-height:1;
  }

  .stats .lbl{
    font-size: clamp(7px, 1.7vmin, 10px);
    letter-spacing:0.01em;
  }

  .grid-wrap{
    flex: 1 1 auto;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 1.6dvh 0 0.4dvh;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(52, 1fr);
    grid-template-rows: repeat(63, 1fr);
    gap: 0.6px;
  }

  .cell{
    background:var(--outline);
    border-radius:0.5px;
    min-width:0;
    min-height:0;
  }
  .cell.lived{ background:var(--lived); }
  .cell.now{
    background:var(--now);
    box-shadow:0 0 1.6vmin rgba(192,90,58,0.85);
    animation: pulse 2.6s ease-in-out infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.5; transform:scale(0.75); }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="header">
    <div class="headline">My Life in Weeks</div>
    <div class="sub">Ikhsan Wisnuadji Gamadarenda</div>
  </div>

  <div class="stats">
    <div class="item"><span class="num" id="ageNum">–</span><span class="lbl">years old</span></div>
    <div class="item"><span class="num" id="weeksNum">–</span><span class="lbl">weeks lived</span></div>
    <div class="item"><span class="num" id="weeksLeftNum">–</span><span class="lbl">weeks left</span></div>
    <div class="item"><span class="num" id="pctNum">–</span><span class="lbl">filled</span></div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
// ====== CONFIG — edit to match you ======
const BIRTH = new Date(1994, 7, 10); // month is 0-indexed: 7 = August
const YEARS = 63;
// ===========================================

const WEEKS_PER_YEAR = 52;
const TOTAL_WEEKS = YEARS * WEEKS_PER_YEAR;

function weekStart(d){
  // Monday of the calendar week containing d
  const day = (d.getDay() + 6) % 7; // 0 = Monday
  const monday = new Date(d);
  monday.setHours(0,0,0,0);
  monday.setDate(d.getDate() - day);
  return monday;
}

function addYears(d, n){
  const nd = new Date(d);
  nd.setFullYear(nd.getFullYear() + n);
  return nd;
}

function diffWeeks(a, b){
  return Math.floor((a - b) / (1000*60*60*24*7));
}

function sizeGrid(){
  const wrap = document.querySelector('.grid-wrap');
  const gridEl = document.getElementById('grid');
  const availW = wrap.clientWidth;
  const availH = wrap.clientHeight;
  if(availW <= 0 || availH <= 0) return;

  // isi penuh ruang yang tersedia — sel jadi sedikit persegi panjang,
  // tapi tidak ada lagi ruang kosong di atas/bawah grid
  gridEl.style.width = availW + 'px';
  gridEl.style.height = availH + 'px';
}

function render(){
  const TODAY = new Date();

  const weeksLived = diffWeeks(weekStart(TODAY), weekStart(BIRTH));

  // completed years, based on the real birthday
  let ageYears = TODAY.getFullYear() - BIRTH.getFullYear();
  const hasHadBirthdayThisYear =
    (TODAY.getMonth() > BIRTH.getMonth()) ||
    (TODAY.getMonth() === BIRTH.getMonth() && TODAY.getDate() >= BIRTH.getDate());
  if(!hasHadBirthdayThisYear) ageYears -= 1;

  const rowFill = new Array(YEARS).fill(0);
  for(let y=0; y<YEARS; y++){
    const yearStart = addYears(BIRTH, y);
    const yearEnd = addYears(BIRTH, y+1);
    if(TODAY >= yearEnd){
      rowFill[y] = WEEKS_PER_YEAR;
    } else if(TODAY >= yearStart){
      const elapsed = diffWeeks(weekStart(TODAY), weekStart(yearStart));
      rowFill[y] = Math.max(0, Math.min(WEEKS_PER_YEAR, elapsed));
    } else {
      rowFill[y] = 0;
    }
  }

  // each grid row = exactly 52 boxes = 1 year, so birthdays always
  // land on a row boundary (see grid-template-columns: repeat(52,...))
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  const frag = document.createDocumentFragment();
  for(let row=0; row<YEARS; row++){
    const filled = rowFill[row];
    const isCurrentRow = (row === ageYears);
    for(let col=0; col<WEEKS_PER_YEAR; col++){
      const div = document.createElement('div');
      let cls = 'cell';
      if(col < filled){
        cls += (isCurrentRow && col === filled - 1) ? ' now' : ' lived';
      }
      div.className = cls;
      frag.appendChild(div);
    }
  }
  gridEl.appendChild(frag);

  document.getElementById('ageNum').textContent = ageYears;
  document.getElementById('weeksNum').textContent = weeksLived.toLocaleString('en-US');
  document.getElementById('weeksLeftNum').textContent = Math.max(TOTAL_WEEKS - weeksLived, 0).toLocaleString('en-US');
  document.getElementById('pctNum').textContent = (weeksLived/TOTAL_WEEKS*100).toFixed(1) + '%';

  sizeGrid();
}

render();
// refresh whenever the wallpaper engine reloads the page, and hourly
// as a fallback in case the engine doesn't reload it on its own
setInterval(render, 60*60*1000);
window.addEventListener('resize', render);
window.addEventListener('orientationchange', render);
</script>

</body>
</html>
